version: 2

seeds:

  - name: loan_classifications
    description: >
      Reference table for loan classifications based on National Bank of Georgia standards.
      Used for NPL ratio and provision calculations.
    columns:
      - name: classification
        description: Loan classification name per NBG standards
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['Standard', 'Watch', 'Substandard', 'Doubtful', 'Loss']

      - name: provision_rate
        description: "Provision rate between 0 and 1. Example: 0.01 = 1%, 0.50 = 50%"
        tests:
          - not_null

  - name: country_risk_tiers
    description: >
      Country risk classification table for AML/KYC purposes.
      Used for geographical risk assessment of customers.
    columns:
      - name: country_code
        description: ISO Alpha-3 country code
        tests:
          - unique
          - not_null

      - name: risk_tier
        description: Risk level of the country
        tests:
          - not_null
          - accepted_values:
              values: ['Tier1', 'Tier2', 'Tier3']

      - name: aml_flag
        description: AML warning flag — indicates high risk countries
        tests:
          - not_null